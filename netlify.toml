[build]
  publish = "."

[[redirects]]
  from = "/test"
  to = "/assessment.html"
  status = 200

[[redirects]]
  from = "/assessment"
  to = "/assessment.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
