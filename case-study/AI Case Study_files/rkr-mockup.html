  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',system-ui,-apple-system,sans-serif; overflow:hidden; height:100vh; }
    .sidebar-nav-item { display:flex; align-items:center; gap:12px; padding:10px 16px; border-radius:8px; font-size:14px; font-weight:500; color:#9CA3AF; cursor:pointer; transition:all 150ms; position:relative; white-space:nowrap; overflow:hidden; }
    .sidebar-nav-item:hover { background:rgba(255,255,255,0.05); color:#fff; }
    .sidebar-nav-item.active { color:#fff; background:rgba(255,255,255,0.1); font-weight:600; }
    .sidebar-nav-item.active::before { content:''; position:absolute; left:0; top:4px; bottom:4px; width:3px; background:#C8102E; border-radius:2px; }
    .doc-item { display:flex; flex-direction:column; gap:4px; padding:12px 16px; border-bottom:1px solid; cursor:pointer; transition:all 150ms; }
    .doc-item:hover { background:rgba(0,0,0,0.02); }
    .dark .doc-item:hover { background:rgba(255,255,255,0.03); }
    .doc-item.active { background:rgba(200,16,46,0.05); border-left:3px solid #C8102E; }
    .dark .doc-item.active { background:rgba(200,16,46,0.1); }
    .fade-in { animation:fadeIn 300ms ease-out; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes countUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(200,16,46,0.4)} 50%{box-shadow:0 0 0 8px rgba(200,16,46,0)} }
    .pulse-kritis { animation:pulse-red 2s infinite; }
    @keyframes slideInRight { from{transform:translateX(100%)} to{transform:translateX(0)} }
    @keyframes slideOutRight { from{transform:translateX(0)} to{transform:translateX(100%)} }
    .progress-bar-fill { transition:width 1s ease-out; }
    .count-up { animation:countUp 600ms ease-out; }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#d1d5db; border-radius:3px; }
    .dark ::-webkit-scrollbar-thumb { background:#3f3f46; }
    .collapsible-section { max-height:0; overflow:hidden; transition:max-height 300ms ease-out; }
    .collapsible-section.open { max-height:2000px; }

    /* Guided Tour Animations */
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideUpBar { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes spotlightPulse {
      0%,100% { box-shadow:0 0 0 4px rgba(200,16,46,0.2), 0 0 20px rgba(200,16,46,0.15); }
      50% { box-shadow:0 0 0 8px rgba(200,16,46,0.1), 0 0 40px rgba(200,16,46,0.1); }
    }

    /* ══ SPOTLIGHT-SYSTEM (Neue Mechanik) ══ */
    .spotlight-target {
      transition: opacity 400ms ease, filter 400ms ease, box-shadow 400ms ease, border-color 400ms ease;
      position: relative;
    }
    /* 1. INAKTIV: stark dimmen */
    .tour-dimmed .spotlight-target {
      opacity: 0.12;
      filter: grayscale(0.8) blur(1px);
      pointer-events: none;
    }
    /* 2. AKTIV: Leuchtkasten in Brand-Rot */
    @keyframes spotlightAppear {
      0%   { box-shadow: 0 0 0 4px rgba(200,16,46,0.3), 0 0 40px rgba(200,16,46,0.15), 0 4px 24px rgba(0,0,0,0.12); }
      50%  { box-shadow: 0 0 0 8px rgba(200,16,46,0.15), 0 0 60px rgba(200,16,46,0.1), 0 4px 24px rgba(0,0,0,0.12); }
      100% { box-shadow: 0 0 0 4px rgba(200,16,46,0.15), 0 0 30px rgba(200,16,46,0.08), 0 4px 24px rgba(0,0,0,0.12); }
    }
    .tour-dimmed .spotlight-target.spotlight-active {
      opacity: 1 !important;
      filter: none !important;
      border: 2.5px solid #C8102E !important;
      border-radius: 12px;
      box-shadow:
        0 0 0 4px rgba(200,16,46,0.15),
        0 0 30px rgba(200,16,46,0.08),
        0 4px 24px rgba(0,0,0,0.12);
      z-index: 5;
      pointer-events: auto;
      animation: spotlightAppear 0.8s ease-out;
    }
    /* Eltern-Container: nur undimmen, KEIN roter Rand */
    .tour-dimmed .spotlight-target.spotlight-parent-active {
      opacity: 1 !important;
      filter: none !important;
      pointer-events: auto;
      border: none !important;
      box-shadow: none !important;
      background: transparent !important;
      animation: none !important;
    }
    .tour-all-visible .spotlight-target {
      opacity: 1;
      filter: none;
      pointer-events: auto;
    }
    /* Wenn Tour aktiv: Extra Padding unten damit Balken nichts verdeckt */
    .tour-active-padding {
      padding-bottom: 220px !important;
    }

    /* ══ SUMMARY SLIDE — staggered fade-in ══ */
    @keyframes staggerIn {
      from { opacity:0; transform:translateY(15px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ══ iPHONE MOCKUP ANIMATIONS ══ */
    @keyframes iphoneSlideIn {
      from { opacity:0; transform: rotate(3deg) translateX(100px) translateY(50px); }
      to   { opacity:1; transform: rotate(3deg) translateX(0) translateY(0); }
    }
    @keyframes micPulse {
      0%,100% { opacity:0.7; }
      50%     { opacity:1; }
    }

    /* ══ LOGIN SCREEN — Lade-Animation (1.42) ══ */
    @keyframes logoScaleIn {
      from { opacity:0; transform:scale(0.8); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes titleFadeInUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes letterReveal {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes subtitleFadeIn {
      from { opacity:0; }
      to   { opacity:1; }
    }
    /* ══ RKR-BRAND — Einheitliche Typografie für RKR-Check ══ */
    .rkr-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 3px;
      display: inline-flex;
      align-items: baseline;
      gap: 0;
    }
    .rkr-brand .rkr-letters { font-weight: 700; }
    .rkr-brand .rkr-check   { font-weight: 500; letter-spacing: 1px; }
    /* Titelfolie (dunkel): brand-red */
    .rkr-brand--dark { color: #C8102E; }
    /* Login-Screen (hell): dunkel */
    .rkr-brand--light { color: #1A1A2E; }

    .rkr-subtitle-line {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    /* Titelfolie: helleres Rot für Lesbarkeit auf dunkel */
    .rkr-subtitle-line--dark { color: #E8384F; }
    /* Login: gedämpftes Grau */
    .rkr-subtitle-line--light { color: #6B7280; }

    .login-logo       { opacity:0; animation: logoScaleIn 0.5s ease-out 0.3s forwards; }
    .login-title      { opacity:0; animation: titleFadeInUp 0.5s ease-out 0.8s forwards; }
    .rkr-letter-1     { opacity:0; animation: letterReveal 0.3s ease-out 1.2s forwards; }
    .rkr-letter-2     { opacity:0; animation: letterReveal 0.3s ease-out 1.35s forwards; }
    .rkr-letter-3     { opacity:0; animation: letterReveal 0.3s ease-out 1.5s forwards; }
    .login-rkr-sub    { opacity:0; animation: subtitleFadeIn 0.4s ease-out 1.6s forwards; }
    .login-user-card  { opacity:0; animation: titleFadeInUp 0.5s ease-out 2.0s forwards; }
  </style>

<body class="bg-gray-50 dark:bg-zinc-950 text-gray-900 dark:text-gray-100">

  <div id="app">
    <div class="flex items-center justify-center" style="background:#F8F9FA;height:calc(100vh - 38px);margin-top:38px;">
      <div class="text-center mx-auto px-8" style="max-width:560px;">

  // ─── HELPER FUNCTIONS ──────────────────────────────────────────
  function getRelevanzBadge(r) {
    if (r === 'hoch') return '<span class="badge-critical">Hoch</span>';
    if (r === 'mittel') return '<span class="badge-warning">Mittel</span>';
    return '<span class="badge-neutral">Irrelevant</span>';
  }

  function getDringlichkeitBadge(d) {
    if (!d || d === '—') return '';
    if (d.includes('KRITIS') || d.includes('24h')) return `<span class="badge bg-red-600 text-white dark:bg-red-600 dark:text-white text-[10px]">${icons.clock} ${d}</span>`;
    if (d === 'Sofort prüfen') return `<span class="badge-critical text-[10px]">${d}</span>`;
    if (d === 'Diese Woche') return `<span class="badge-warning text-[10px]">${d}</span>`;
    return `<span class="badge-info text-[10px]">${d}</span>`;
  }

  function getRisikoBadge(score) {
    if (score >= 8) return `<span class="badge-critical">R: ${score.toFixed(1)}</span>`;
    if (score >= 5) return `<span class="badge-warning">R: ${score.toFixed(1)}</span>`;
    return `<span class="badge-success">R: ${score.toFixed(1)}</span>`;
  }

  function getKonfidenzColor(k) {
    if (k >= 90) return { bar:'bg-emerald-500', text:'text-emerald-700 dark:text-emerald-400', label:'Hohe Sicherheit' };
    if (k >= 70) return { bar:'bg-blue-500', text:'text-blue-700 dark:text-blue-400', label:'Mittlere Sicherheit' };
    if (k >= 50) return { bar:'bg-amber-500', text:'text-amber-700 dark:text-amber-400', label:'Überprüfung empfohlen' };
    return { bar:'bg-red-500', text:'text-red-700 dark:text-red-400', label:'Manuelle Prüfung erforderlich' };
  }

  function getFilteredDocs() {
    let docs = [...documents];
    // Filter nach Relevanz
    if (state.activeFilter === 'hoch') docs = docs.filter(d => d.relevanz === 'hoch');
    else if (state.activeFilter === 'mittel') docs = docs.filter(d => d.relevanz === 'mittel');
    else if (state.activeFilter === 'irrelevant') docs = docs.filter(d => d.relevanz === 'irrelevant');
    else if (state.activeFilter === 'unbearbeitet') docs = docs.filter(d => d.status === 'unbearbeitet');
    // Suchfunktion
    if (state.searchQuery) {
      const q = state.searchQuery;
      docs = docs.filter(d =>
        d.title.toLowerCase().includes(q) ||
        d.sender.toLowerCase().includes(q) ||
        d.zusammenfassung.toLowerCase().includes(q) ||
        d.channel.toLowerCase().includes(q) ||
        d.bereiche.some(b => b.toLowerCase().includes(q))
      );
    }
    return docs;
  }

  function formatCountdown(deadline) {
    const now = new Date();
    const diff = deadline - now;
    if (diff <= 0) return { text:'ABGELAUFEN', color:'text-red-600', urgent:true };
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    const text = `${h}h ${String(m).padStart(2,'0')}min ${String(s).padStart(2,'0')}s`;
    const color = h < 1 ? 'text-red-600' : h < 6 ? 'text-orange-500' : h < 12 ? 'text-amber-500' : 'text-yellow-600';
    return { text, color, urgent: h < 6 };
  }

  // ─── RENDER ENGINE ─────────────────────────────────────────────
  function render() {
    const app = document.getElementById('app');
    switch(state.currentScreen) {
      case 'login': app.innerHTML = renderLogin(); break;
      case 'relevanz': app.innerHTML = renderMainLayout(renderRelevanz()); break;
      case 'konsistenz': app.innerHTML = renderMainLayout(renderKonsistenz()); break;
      case 'risiko': app.innerHTML = renderMainLayout(renderRisikoRadar()); break;
      case 'dashboard': app.innerHTML = renderMainLayout(renderDashboard()); break;
      case 'regelwerk': app.innerHTML = renderMainLayout(renderRegelwerk()); break;
    }

    // Windows 11 Title Bar — nur auf nicht-title Screens
    updateWinFrame();
    bindEvents();
    if (state.currentScreen === 'dashboard') initCharts();
    if (state.chatPanelOpen) bindChatEvents();
    updateKritisCountdown();
    // Nach jedem render(): Spotlight wiederherstellen wenn Tour aktiv
    if (tour.active && tour.barVisible) {
      const step = tour.steps[tour.currentStep];
      if (step && step.spotlightTargets && !step.isLoginStep) {
        setTimeout(() => applySpotlight(step.spotlightTargets), 50);
      }
    }
  }

    state.currentScreen = 'relevanz';
    render();
  }

  function renderFundstellenSorted(doc) {
    const schwereOrder = {hoch:0, mittel:1, niedrig:2};
    const sortMode = state.konsistenzSort || 'kritikalitaet';
    const sorted = sortMode === 'kritikalitaet'
      ? [...doc.fundstellen].sort((a,b) => schwereOrder[a.schwere] - schwereOrder[b.schwere])
      : doc.fundstellen;

    let html = `
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs text-gray-500">${doc.fundstellen.length} Fundstellen</span>
        <div class="flex items-center gap-1 p-0.5 bg-gray-100 rounded-lg">
          <button onclick="setKonsistenzSort('reihenfolge')" class="px-2.5 py-1 rounded-md text-[11px] font-medium transition-all ${sortMode === 'reihenfolge' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500 hover:text-gray-700'}">Reihenfolge</button>
          <button onclick="setKonsistenzSort('kritikalitaet')" class="px-2.5 py-1 rounded-md text-[11px] font-medium transition-all ${sortMode === 'kritikalitaet' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500 hover:text-gray-700'}">Nach Kritikalität</button>
        </div>
      </div>`;

    sorted.forEach((f, i) => {
      const borderColor = f.schwere === 'hoch' ? 'border-l-red-500' : f.schwere === 'mittel' ? 'border-l-amber-400' : 'border-l-emerald-400';
      const dotColor = f.schwere === 'hoch' ? 'bg-red-500' : f.schwere === 'mittel' ? 'bg-amber-400' : 'bg-emerald-400';
      const badgeClass = f.schwere === 'hoch' ? 'badge-critical' : f.schwere === 'mittel' ? 'badge-warning' : 'badge-info';

      html += `<div class="card overflow-hidden mb-3 border-l-4 ${borderColor}">
        <div class="p-4 border-b border-gray-200 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full ${dotColor} shrink-0"></span>
            <span class="text-sm font-semibold">${f.bereich}</span>
            <span class="text-xs text-gray-400">${f.stelle}</span>
          </div>
          <span class="${badgeClass}">${f.schwere}</span>
        </div>`;

      if (state.konsistenzTab === 'sidebyside') {
        html += `<div class="grid grid-cols-2 divide-x divide-gray-200">
          <div class="p-4"><div class="text-[10px] font-semibold text-red-600 uppercase mb-1">IST</div><p class="text-sm text-red-800 bg-red-50 p-2 rounded">${f.ist}</p></div>
          <div class="p-4"><div class="text-[10px] font-semibold text-emerald-600 uppercase mb-1">SOLL</div><p class="text-sm text-emerald-800 bg-emerald-50 p-2 rounded">${f.soll}</p></div>
        </div>`;
      } else if (state.konsistenzTab === 'inline') {
        html += `<div class="p-4"><p class="text-sm"><span class="line-through text-red-600 bg-red-50 px-1 rounded">${f.ist}</span> → <span class="text-emerald-600 bg-emerald-50 px-1 rounded font-medium">${f.soll}</span></p></div>`;
      } else {
        html += `<div class="p-4"><p class="text-sm text-gray-700"><strong>Fundstelle ${i+1}:</strong> In ${f.stelle} wurde folgende Abweichung festgestellt: ${f.ist} Empfehlung: ${f.soll}</p></div>`;
      }

      html += `<div class="px-4 py-2 bg-gray-50 flex gap-2">
        <button class="btn-confirm text-xs py-1 px-3">${icons.check} Übernehmen</button>
        <button class="btn-ghost text-xs py-1 px-3">${icons.chat} Kommentar</button>
      </div></div>`;
    });

    return html;
  }

            <button class="inline-flex items-center gap-1 px-3 py-2 rounded-md text-xs font-bold bg-blue-600 text-white hover:bg-blue-700">${icons.check} Prüfung abschließen</button>
          </div>
        </div>
      </div>

      <!-- ═══ KI-QUALITÄTSSICHERUNG ═══ -->
      <div class="rounded-xl border-2 border-amber-300 bg-amber-50 p-5 spotlight-target" data-spotlight="konsistenz-ki-qs">
        <div class="flex items-start gap-3">
          <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center text-white shrink-0 mt-0.5">${icons.shield}</div>
          <div class="flex-1">
            <div class="text-sm font-bold text-gray-900 mb-1">KI-Qualitätssicherung</div>
            <p class="text-sm text-gray-700 mb-3">Hast du die Datenschutzklausel (§ 14) überprüft? Beim letzten Vertrag dieses Typs wurde eine Überarbeitung vorgenommen. Möchtest du die aktuelle Version mit dem gespeicherten Template abgleichen?</p>
            <div class="flex gap-2">
              <button class="inline-flex items-center gap-1 px-4 py-1.5 rounded-md text-xs font-medium bg-blue-600 text-white hover:bg-blue-700">Ja, abgleichen</button>
              <button class="inline-flex items-center gap-1 px-4 py-1.5 rounded-md text-xs font-medium border border-gray-300 text-gray-700 bg-white hover:bg-gray-50">Nein, bereits geprüft</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  // ─── KRITIS COUNTDOWN ─────────────────────────────────────────
  let kritisInterval;
  function updateKritisCountdown() {
    if (kritisInterval) clearInterval(kritisInterval);
    const kritisDoc = documents.find(d => d.isKritis);
    if (!kritisDoc) return;

    function tick() {
      const cd = formatCountdown(kritisDoc.kritisDeadline);
      const bannerEl = document.getElementById('kritis-banner-countdown');
      const docEl = document.getElementById('kritis-doc-countdown');
      const detailEl = document.getElementById('kritis-detail-countdown');
      if (bannerEl) bannerEl.textContent = 'Verbleibend: ' + cd.text;
      if (docEl) { docEl.textContent = 'KRITIS: ' + cd.text; docEl.className = `text-[10px] font-semibold font-mono ${cd.color}`; }
      if (detailEl) { detailEl.textContent = cd.text; detailEl.className = `font-mono font-bold ${cd.color}`; }
    }
    tick();
    kritisInterval = setInterval(tick, 1000);
  }

  function initCharts() {
    const isDark = state.darkMode;
    const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
    const textColor = isDark ? '#a1a1aa' : '#6b7280';

    // Bar Chart
    const barCtx = document.getElementById('chart-bar');
    if (barCtx) {
      new Chart(barCtx, {
        type: 'bar',
        data: {
          labels: ['KW04','KW05','KW06','KW07'],
          datasets: [
            { label:'Hoch', data:[5,9,6,7], backgroundColor:'#DC2626', borderRadius:4 },
            { label:'Mittel', data:[8,7,5,6], backgroundColor:'#F59E0B', borderRadius:4 },
            { label:'Niedrig', data:[6,4,9,10], backgroundColor:'#10B981', borderRadius:4 },
          ]
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          scales: { x:{ stacked:true, grid:{display:false}, ticks:{color:textColor} }, y:{ stacked:true, grid:{color:gridColor}, ticks:{color:textColor} } },
          plugins: { legend:{ position:'bottom', labels:{color:textColor, usePointStyle:true, pointStyle:'circle', padding:16} } },
          animation: { duration:1200, easing:'easeOutQuart' }
        }
      });
    }

    // Donut Chart
    const donutCtx = document.getElementById('chart-donut');
    if (donutCtx) {
      new Chart(donutCtx, {
        type: 'doughnut',
        data: {
          labels: ['Recht','Compliance','Revision'],
          datasets: [{ data:[45,35,20], backgroundColor:['#3B82F6','#10B981','#8B5CF6'], borderWidth:0, borderRadius:4 }]
        },
        options: {
          responsive:true, maintainAspectRatio:false, cutout:'65%',
          plugins: { legend:{ position:'bottom', labels:{color:textColor, usePointStyle:true, pointStyle:'circle', padding:16} } },
          animation: { duration:1200, easing:'easeOutQuart' }
        }
      });
    }

    // Count-up animations
    document.querySelectorAll('.count-up').forEach(el => {
      const target = parseInt(el.dataset.target);
      let current = 0;
      const step = target / 40;
      const interval = setInterval(() => {
        current += step;
        if (current >= target) { current = target; clearInterval(interval); }
        el.textContent = Math.round(current);
      }, 30);
    });
  }

  // ── TOUR CONTROL FUNCTIONS ──────────────────────────────────────

  function startTour() {
    tour.active = true;
    tour.currentStep = 0;
    // Step 0 = Login-Screen (Kommentarleiste erscheint)
    const step = tour.steps[0];
    if (step.action) step.action();
    renderTourOverlay();
  }

  function endTour() {
    tour.active = false;
    // Remove overlays
    const overlay = document.getElementById('tour-overlay');
    if (overlay) overlay.remove();
    removeSpotlight();
    clearSpotlight();
    // Reset to clean state — zurück zum freien Modus (Relevanz)
    state.currentScreen = 'relevanz';
    state.selectedDocument = null;
    state.konsistenzDoc = null;
    render();
  }

  function tourNext() {
    const prevStep = tour.steps[tour.currentStep];

    // isLastInCategory: → nächster Klick → Spotlight aus, Leiste weg, alles hell
    if (prevStep.isLastInCategory && prevStep._shownAllVisible !== true) {
      prevStep._shownAllVisible = true;
      // Leiste ausblenden, Spotlight aus, alles hell
      tour.barVisible = false;
      const bar = document.getElementById('tour-bottom-bar');
      const showBtn = document.getElementById('tour-show-btn');
      if (bar) bar.style.transform = 'translateY(100%)';
      if (showBtn) { showBtn.style.opacity = '1'; showBtn.style.pointerEvents = 'auto'; }
      removeFullDim();
      applySpotlight(['ALL']);
      // Scroll to top when showing "all visible" state
      setTimeout(() => {
        document.querySelectorAll('.overflow-y-auto').forEach(el => el.scrollTop = 0);
        const mainContent = document.querySelector('main');
        if (mainContent) mainContent.scrollTop = 0;
        window.scrollTo(0, 0);
      }, 50);
      return;
    }

    // Reset _shownAllVisible flag
    if (prevStep._shownAllVisible) prevStep._shownAllVisible = false;

    if (tour.currentStep < tour.steps.length - 1) {
      const prevIdx = tour.currentStep;
      tour.currentStep++;
      tour.barVisible = true;
      const step = tour.steps[tour.currentStep];

      // ── Sidebar bei Highlight-Steps immer eingeklappt ──
      // (Sidebar wird nur auf Kategorie-Slides als Overlay angezeigt)
      if (step.type === 'highlight') {
        state.sidebarExpanded = false;
      }

      removeSpotlight();
      if (step.action) step.action();
      setTimeout(() => {
        renderTourOverlay();
        // ScrollIntoView zum aktiven Spotlight-Element
        if (step.spotlightTargets && step.spotlightTargets.length > 0) {
          setTimeout(() => {
            const el = document.querySelector(`[data-spotlight="${step.spotlightTargets[0]}"]`);
            if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
          }, 300);
        }
      }, 150);
    }
  }

  function tourPrev() {
    // Reset any _shownAllVisible flags
    const currentStep = tour.steps[tour.currentStep];
    if (currentStep._shownAllVisible) currentStep._shownAllVisible = false;

    if (tour.currentStep > 0) {
      const prevIdx = tour.currentStep;
      tour.currentStep--;
      tour.barVisible = true;
      const step = tour.steps[tour.currentStep];
      // Reset that step's flag too
      if (step._shownAllVisible) step._shownAllVisible = false;

      // ── Sidebar bei Highlight-Steps immer eingeklappt ──
      if (step.type === 'highlight') {
        state.sidebarExpanded = false;
      }

      removeSpotlight();
      if (step.action) step.action();
      setTimeout(() => {
        renderTourOverlay();
        if (step.spotlightTargets && step.spotlightTargets.length > 0) {
          setTimeout(() => {
            const el = document.querySelector(`[data-spotlight="${step.spotlightTargets[0]}"]`);
            if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
          }, 300);
        }
      }, 150);
    }
  }

  function removeSpotlight() {
    document.querySelectorAll('.tour-spotlight-dim').forEach(el => el.remove());

    document.querySelectorAll('.tour-fullscreen-dim').forEach(el => el.remove());

  // Full-screen dim overlay (Christopher: "leichtes Grau über den Mockup")
  function applyFullDim() {
    removeSpotlight();
    const dim = document.createElement('div');
    dim.className = 'tour-fullscreen-dim';
    dim.style.cssText = `
      position:fixed; inset:0; z-index:90;
      background:rgba(0,0,0,0.35);

    `;

  }

  // Remove dim (when bar hides = Mockup frei sichtbar)
  function removeFullDim() {
    document.querySelectorAll('.tour-fullscreen-dim').forEach(el => {
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
    });
  }

  // ── SPOTLIGHT-MECHANIK (1.3) ─────────────────────────────────
  // Highlights specific areas by data-spotlight attribute
  function applySpotlight(targetNames) {
    const mainContent = document.querySelector('main');
    if (!mainContent) return;

    // Remove old states + any lingering full-dim overlays
    mainContent.classList.remove('tour-dimmed', 'tour-all-visible');
    document.querySelectorAll('.spotlight-active').forEach(el => el.classList.remove('spotlight-active'));
    document.querySelectorAll('.spotlight-parent-active').forEach(el => el.classList.remove('spotlight-parent-active'));
    document.querySelectorAll('.tour-fullscreen-dim').forEach(el => el.remove());

    // Tour-Padding auf alle scrollbaren Container
    document.querySelectorAll('.overflow-y-auto').forEach(el => el.classList.add('tour-active-padding'));

    if (!targetNames || targetNames.length === 0) {
      mainContent.classList.add('tour-all-visible');
      return;
    }

    if (targetNames[0] === 'ALL') {
      mainContent.classList.add('tour-all-visible');
      return;
    }

    // Dim everything, spotlight specific targets
    mainContent.classList.add('tour-dimmed');
    targetNames.forEach(name => {
      const el = document.querySelector(`[data-spotlight="${name}"]`);
      if (el) {
        el.classList.add('spotlight-active');
        // Wenn das Element in einem anderen spotlight-target verschachtelt ist,
        // muss der Eltern-Container undimmt werden (CSS opacity multipliziert sich)
        // Eltern bekommen eigene Klasse OHNE roten Rand
        let parent = el.parentElement;
        while (parent && parent !== mainContent) {
          if (parent.classList.contains('spotlight-target') && !parent.classList.contains('spotlight-active')) {
            parent.classList.add('spotlight-parent-active');
          }
          parent = parent.parentElement;
        }
      }
    });
  }

  function clearSpotlight() {
    const mainContent = document.querySelector('main');
    if (mainContent) {
      mainContent.classList.remove('tour-dimmed', 'tour-all-visible');
    }
    document.querySelectorAll('.spotlight-active').forEach(el => el.classList.remove('spotlight-active'));
    document.querySelectorAll('.spotlight-parent-active').forEach(el => el.classList.remove('spotlight-parent-active'));
    document.querySelectorAll('.tour-active-padding').forEach(el => el.classList.remove('tour-active-padding'));
  }

  // Toggle bar visibility (Dock-like: rein/raus)
  function toggleTourBar() {
    tour.barVisible = !tour.barVisible;
    const bar = document.getElementById('tour-bottom-bar');
    const showBtn = document.getElementById('tour-show-btn');
    if (bar) {
      if (tour.barVisible) {
        bar.style.transform = 'translateY(0)';
        if (showBtn) { showBtn.style.opacity = '0'; showBtn.style.pointerEvents = 'none'; }
        // Spotlight-CSS dimmt Targets — kein Full-Dim-Overlay nötig
        const step = tour.steps[tour.currentStep];
        if (step && step.spotlightTargets && step.spotlightTargets.length > 0) {
          applySpotlight(step.spotlightTargets);
        }
      } else {
        bar.style.transform = 'translateY(100%)';
        if (showBtn) { showBtn.style.opacity = '1'; showBtn.style.pointerEvents = 'auto'; }
        removeFullDim();
        clearSpotlight();
      }
    }
  }

  }

      // ── FULL-SCREEN CINEMATIC SLIDE (schwarzer Hintergrund = Rahmen, 1.18) ──
      removeSpotlight();

      const hasSidebar = !!step.action;
      const sidebarW = hasSidebar ? 240 : 0;

      overlay.innerHTML = `
        <div class="fixed inset-0 z-[100]" style="background:linear-gradient(135deg, #0f1117 0%, #1a1d23 40%, #1f1215 100%); animation:fadeIn 400ms ease-out">
          <!-- Sidebar Overlay auf Zwischenfolien -->
          ${hasSidebar ? renderSlideSidebar() : ''}

          <!-- Subtle grid pattern -->
          <div class="absolute inset-0 opacity-[0.03]" style="background-image:radial-gradient(circle at 1px 1px, white 1px, transparent 0); background-size:40px 40px;"></div>

          <!-- Content — zentriert RECHTS der Sidebar -->
          <div style="position:absolute;top:0;bottom:0;left:${sidebarW}px;right:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 40px;animation:slideUp 500ms ease-out;">
            <!-- Icon -->
            ${step.icon ? `<div style="color:#C8102E;margin-bottom:16px;opacity:0.9;display:flex;justify-content:center;"><span style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;">${(iconMap[step.icon] || '').replace(/width="\d+"/, 'width="32"').replace(/height="\d+"/, 'height="32"')}</span></div>` : ''}

            <!-- Subtitle (Kategorie) — zwischen Icon und Titel -->
            ${step.subtitle ? `<p style="font-size:13px;font-weight:600;color:#C8102E;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;margin:0 0 20px;text-align:center;">${step.subtitle}</p>` : ''}

            <!-- Title -->
            <h1 style="font-size:56px;font-weight:300;letter-spacing:-0.5px;color:#fff;margin:0 0 16px;font-family:'Inter',sans-serif;text-align:center;">${step.title}</h1>

            <!-- Body -->
            ${step.body ? `
            <div style="max-width:520px;text-align:center;">
              <div style="width:60px;height:1px;background:rgba(255,255,255,0.15);margin:0 auto 32px;"></div>
              <p style="font-size:18px;line-height:1.8;color:rgba(255,255,255,0.6);white-space:pre-line;margin:0;">${step.body}</p>
            </div>` : ''}
          </div>

          <!-- Bottom Navigation — minimal, elegant -->
          <div style="position:absolute;bottom:24px;left:${sidebarW}px;right:0;display:flex;align-items:center;justify-content:center;gap:40px;z-index:10;">
            ${!isFirst ? `<span onclick="tourPrev()" style="cursor:pointer;font-size:20px;color:rgba(255,255,255,0.4);transition:color 200ms;line-height:1;" onmouseenter="this.style.color='rgba(255,255,255,0.8)'" onmouseleave="this.style.color='rgba(255,255,255,0.4)'">&larr;</span>` : '<span style="width:20px;"></span>'}
            <span style="font-size:13px;color:rgba(255,255,255,0.3);font-weight:400;letter-spacing:2px;font-family:'Inter',sans-serif;">${tour.currentStep + 1} / ${total}</span>
            ${!isLast ? `<span onclick="tourNext()" style="cursor:pointer;font-size:20px;color:rgba(255,255,255,0.4);transition:color 200ms;line-height:1;" onmouseenter="this.style.color='rgba(255,255,255,0.8)'" onmouseleave="this.style.color='rgba(255,255,255,0.4)'">&rarr;</span>` : `<span onclick="endTour()" style="cursor:pointer;font-size:20px;color:rgba(255,255,255,0.4);transition:color 200ms;line-height:1;" onmouseenter="this.style.color='rgba(255,255,255,0.8)'" onmouseleave="this.style.color='rgba(255,255,255,0.4)'">&rarr;</span>`}
          </div>

          <!-- Progress bar — minimalistisch, volle Breite -->
          <div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,0.08);">
            <div style="height:100%;background:rgba(200,16,46,0.6);transition:width 300ms ease;width:${progress}%;"></div>
          </div>

        </div>
      `;

    } else {
      // ── HIGHLIGHT STEP — Dock-like Bottom Bar + Kommentarbalken ──

      // Login-Step: kein Dim, kein Spotlight (es gibt noch kein <main>)
      if (step.isLoginStep) {
        tour.barVisible = true;
        // Kein applyFullDim() — Login-Screen bleibt unverändert
      } else {
        showTourBar();
      }

      // Apply spotlight to specific areas
      setTimeout(() => {
        if (step.spotlightTargets && !step.isLoginStep) {
          applySpotlight(step.spotlightTargets);
        } else {
          clearSpotlight();
        }
      }, 200);

      // Get the step number (only counting highlight steps)
      const highlightSteps = tour.steps.filter(s => s.type === 'highlight');
      const currentHighlightIdx = highlightSteps.indexOf(step) + 1;
      const totalHighlightSteps = highlightSteps.length;
      const kategorie = step.stepLabel || '';

      overlay.innerHTML = `
        <!-- Bottom Presenter Bar (Dock-like: slides in/out) -->
        <div id="tour-bottom-bar" class="fixed bottom-0 left-0 right-0 z-[100] backdrop-blur-xl bg-white/[0.97] dark:bg-zinc-900/[0.97] border-t-[3px] border-brand-red shadow-[0_-8px_32px_rgba(0,0,0,0.12)]" style="${step.isLoginStep ? 'animation:slideUpBar 1200ms cubic-bezier(0.16,1,0.3,1);' : ''} transition:transform 350ms cubic-bezier(0.16,1,0.3,1)">


          <div class="max-w-5xl mx-auto px-8 py-5">
            <div class="flex items-start gap-5">
              <!-- Step Number Circle -->
              <div class="relative shrink-0">
                <div class="w-12 h-12 rounded-full bg-brand-red text-white flex items-center justify-center font-bold text-base shadow-lg shadow-red-200">
                  ${currentHighlightIdx}
                </div>
                <div class="absolute -bottom-1 -right-1 w-5 h-5 rounded-full bg-white dark:bg-zinc-800 border-2 border-brand-red flex items-center justify-center">
                  <span class="text-[8px] font-bold text-brand-red">${totalHighlightSteps}</span>
                </div>
              </div>

              <!-- Content -->
              <div class="flex-1 min-w-0">
                <div class="text-[10px] font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-1">${kategorie}</div>
                <h3 class="font-light text-xl text-gray-900 dark:text-white tracking-tight mb-1">${step.title}</h3>
                <p class="text-sm text-brand-red font-semibold mb-2">${step.subtitle}</p>
                <p style="font-size:0.85rem;line-height:1.5;color:#4B5563;white-space:pre-line;margin:0;">${step.body}</p>
              </div>

              <!-- Navigation — elegante Pfeile -->
              <div class="flex items-center gap-6 shrink-0 pt-1">
                ${!isFirst ? `<span onclick="tourPrev()" style="cursor:pointer;font-size:22px;color:rgba(0,0,0,0.25);transition:color 200ms;line-height:1;user-select:none;" onmouseenter="this.style.color='rgba(0,0,0,0.6)'" onmouseleave="this.style.color='rgba(0,0,0,0.25)'">&larr;</span>` : '<span style="width:22px;"></span>'}
                ${!isLast ? `<span onclick="tourNext()" style="cursor:pointer;font-size:22px;color:rgba(0,0,0,0.25);transition:color 200ms;line-height:1;user-select:none;" onmouseenter="this.style.color='rgba(0,0,0,0.6)'" onmouseleave="this.style.color='rgba(0,0,0,0.25)'">&rarr;</span>` : `<span onclick="endTour()" style="cursor:pointer;font-size:12px;color:rgba(0,0,0,0.35);font-weight:500;letter-spacing:1px;transition:color 200ms;user-select:none;" onmouseenter="this.style.color='rgba(0,0,0,0.6)'" onmouseleave="this.style.color='rgba(0,0,0,0.35)'">Beenden</span>`}
              </div>
            </div>

            <!-- Progress Bar -->
            <div class="mt-4 flex items-center gap-3">
              <div class="flex-1 h-[3px] rounded-full bg-gray-100 dark:bg-zinc-800 overflow-hidden">
                <div class="h-full rounded-full bg-gradient-to-r from-brand-red to-red-500 transition-all duration-700 ease-out" style="width:${progress}%"></div>
              </div>
              <span class="text-[11px] text-gray-400 font-mono shrink-0">${tour.currentStep + 1}/${total}</span>
            </div>
          </div>
        </div>

        <!-- Hidden show-btn anchor (no visible button — toggle via Spacebar only) -->
        <div id="tour-show-btn" class="fixed bottom-0 left-1/2 -translate-x-1/2 z-[100]" style="opacity:0; pointer-events:none;"></div>
      `;
    }
  }

  // ── FULLSCREEN TOGGLE (F-Taste) ─────────────────────────────────
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }

  // ── OVERVIEW OVERLAY (O-Taste) — Gesamtübersicht aller Features ──
  let overviewOpen = false;

  function toggleOverview() {
    if (overviewOpen) { closeOverview(); return; }
    overviewOpen = true;

    // Sammle Kategorien aus den Steps
    const categories = [];
    let currentCat = null;
    tour.steps.forEach((step, idx) => {
      if (step.type === 'slide') {
        currentCat = { title: step.title, subtitle: step.subtitle, steps: [], slideIdx: idx };
        categories.push(currentCat);
      } else if (step.type === 'highlight' && step.stepLabel) {
        if (!currentCat || !step.stepLabel.includes(currentCat.title)) {
          // Eigenständiger Bereich
          const catName = step.stepLabel;
          currentCat = { title: catName, subtitle: '', steps: [], slideIdx: idx };
          categories.push(currentCat);
        }
        currentCat.steps.push({ title: step.title, subtitle: step.subtitle, idx: idx });
      }
    });

    const ov = document.createElement('div');
    ov.id = 'tour-overview';
    ov.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);overflow-y:auto;animation:fadeIn 200ms ease-out;';
    ov.innerHTML = `
      <div style="max-width:720px;margin:0 auto;padding:48px 24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;">
          <div>
            <h2 style="font-family:'Inter',sans-serif;font-weight:300;font-size:28px;color:white;margin:0;">Übersicht</h2>
            <p style="font-family:'Inter',sans-serif;font-size:13px;color:#9CA3AF;margin-top:4px;">Klicke auf einen Bereich, um direkt dorthin zu springen</p>
          </div>
          <div style="font-family:'Inter',sans-serif;font-size:12px;color:#6B7280;">
            <kbd style="padding:2px 6px;border-radius:4px;border:1px solid #374151;font-family:monospace;font-size:11px;color:#9CA3AF;">O</kbd> schließen
          </div>
        </div>
        ${categories.map((cat, ci) => `
          <div style="margin-bottom:24px;">
            <button onclick="jumpToStep(${cat.slideIdx})" style="display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:16px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:all 150ms;" onmouseover="this.style.background='rgba(200,16,46,0.15)';this.style.borderColor='rgba(200,16,46,0.4)'" onmouseout="this.style.background='rgba(255,255,255,0.06)';this.style.borderColor='rgba(255,255,255,0.08)'">
              <div style="width:36px;height:36px;border-radius:50%;background:#C8102E;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:'Inter',sans-serif;flex-shrink:0;">${ci + 1}</div>
              <div style="flex:1;min-width:0;">
                <div style="font-family:'Inter',sans-serif;font-weight:600;font-size:15px;color:white;">${cat.title}</div>
                ${cat.subtitle ? `<div style="font-family:'Inter',sans-serif;font-size:12px;color:#9CA3AF;margin-top:2px;">${cat.subtitle}</div>` : ''}
              </div>
              <div style="font-family:'Inter',sans-serif;font-size:11px;color:#6B7280;">${cat.steps.length} Schritte</div>
            </button>
            ${cat.steps.length > 0 ? `
            <div style="margin-left:42px;padding-left:16px;border-left:2px solid rgba(255,255,255,0.06);margin-top:8px;">
              ${cat.steps.map(s => `
                <button onclick="jumpToStep(${s.idx})" style="display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:8px 12px;border-radius:8px;background:transparent;border:none;cursor:pointer;transition:background 150ms;" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">
                  <div style="width:6px;height:6px;border-radius:50%;background:${tour.currentStep === s.idx ? '#C8102E' : '#4B5563'};flex-shrink:0;"></div>
                  <span style="font-family:'Inter',sans-serif;font-size:13px;color:${tour.currentStep === s.idx ? '#C8102E' : '#D1D5DB'};font-weight:${tour.currentStep === s.idx ? '600' : '400'};">${s.title}</span>
                  <span style="font-family:'Inter',sans-serif;font-size:11px;color:#6B7280;margin-left:auto;">${s.subtitle}</span>
                </button>
              `).join('')}
            </div>` : ''}
          </div>
        `).join('')}
      </div>
    `;
    document.body.appendChild(ov);
  }

  function closeOverview() {
    overviewOpen = false;
    const ov = document.getElementById('tour-overview');
    if (ov) ov.remove();
  }

  function jumpToStep(idx) {
    closeOverview();
    tour.currentStep = idx;
    tour.barVisible = true;
    const step = tour.steps[idx];
    if (step.action) step.action();
    setTimeout(() => {
      renderTourOverlay();
      if (step.spotlightTargets && step.spotlightTargets.length > 0) {
        setTimeout(() => {
          const el = document.querySelector(`[data-spotlight="${step.spotlightTargets[0]}"]`);
          if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
        }, 300);
      }
    }, 150);
  }

  // ── KEYBOARD NAVIGATION ─────────────────────────────────────────
  // ArrowRight/Enter = nächster Step, ArrowLeft = zurück
  // Space = Bar ein-/ausblenden (Dock-Toggle)
  // F = Vollbildmodus, O = Übersicht/Sprungliste
  // Escape = Tour beenden / Übersicht schließen
  document.addEventListener('keydown', (e) => {
    // Login-Screen: G → Tour starten (nur wenn Tour nicht aktiv)
    if (state.currentScreen === 'login' && !tour.active && (e.key === 'g' || e.key === 'G')) {
      e.preventDefault(); startTour(); return;
    }

    // Login-Screen: Enter/ArrowRight → Freier Modus (Relevanz)
    if (state.currentScreen === 'login' && !tour.active && (e.key === 'Enter' || e.key === 'ArrowRight')) {
      e.preventDefault(); loginAndEnter(); return;
    }

    // F = Fullscreen (immer verfügbar)
    if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFullscreen(); return; }

    // O = Overview Toggle (nur wenn Tour aktiv)
    if ((e.key === 'o' || e.key === 'O') && tour.active) { e.preventDefault(); toggleOverview(); return; }

    // Escape: erst Overview schließen, dann Tour beenden
    if (e.key === 'Escape') {
      e.preventDefault();
      if (overviewOpen) { closeOverview(); return; }
      if (tour.active) endTour();
      return;
    }

    if (!tour.active || overviewOpen) return;
    const step = tour.steps[tour.currentStep];

    if (e.key === 'ArrowRight' || e.key === 'Enter') { e.preventDefault(); tourNext(); }
    if (e.key === 'ArrowLeft' || e.key === 'Backspace') { e.preventDefault(); tourPrev(); }
    if (e.key === ' ' && step.type === 'highlight') { e.preventDefault(); toggleTourBar(); }
    if (e.key === ' ' && step.type === 'slide') { e.preventDefault(); tourNext(); }
  });

  // ── TOUR STARTS VIA MICHAEL OBER KLICK (1.12) ──────────────────
  // No separate button needed — loginAs('ober') is replaced by startTour() on the user card

  // ─── INITIAL RENDER ────────────────────────────────────────────
  state.currentUser = users.find(u => u.id === 'ober');
  render();

        <!-- Left: Favicon + Pfeile -->
        <div style="display:flex;align-items:center;gap:12px;padding-left:12px;">
          <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyODAgNjAiIHdpZHRoPSIyODAiIGhlaWdodD0iNjAiPgogIDxkZWZzPgogICAgPGxpbmVhckdyYWRpZW50IGlkPSJib2x0IiB4MT0iMCUiIHkxPSIwJSIgeDI9IjEwMCUiIHkyPSIxMDAlIj4KICAgICAgPHN0b3Agb2Zmc2V0PSIwJSIgc3R5bGU9InN0b3AtY29sb3I6IzIyYzU1ZSIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0eWxlPSJzdG9wLWNvbG9yOiMxNmEzNGEiLz4KICAgIDwvbGluZWFyR3JhZGllbnQ+CiAgPC9kZWZzPgogIDwhLS0gSWNvbjogTGlnaHRuaW5nIGJvbHQgaW4gY2lyY2xlIC0tPgogIDxjaXJjbGUgY3g9IjI4IiBjeT0iMzAiIHI9IjI0IiBmaWxsPSJub25lIiBzdHJva2U9InVybCgjYm9sdCkiIHN0cm9rZS13aWR0aD0iMyIvPgogIDxwYXRoIGQ9Ik0zMiAxNCBMMjIgMzIgTDI5IDMyIEwyNSA0NiBMMzggMjYgTDMwIDI2IFoiIGZpbGw9InVybCgjYm9sdCkiLz4KICA8IS0tIFRleHQgLS0+CiAgPHRleHQgeD0iNjIiIHk9IjM3IiBmb250LWZhbWlseT0iJ1BsdXMgSmFrYXJ0YSBTYW5zJywgJ1NlZ29lIFVJJywgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIyNCIgZm9udC13ZWlnaHQ9IjcwMCIgZmlsbD0iI2UwZTBlMCIgbGV0dGVyLXNwYWNpbmc9Ii0wLjUiPkVuZXJneSBHbWJIPC90ZXh0Pgo8L3N2Zz4K" alt="T" style="width:18px;height:18px;border-radius:3px;object-fit:contain;">
          <span style="font-size:0.8rem;font-weight:400;color:rgba(255,255,255,0.7);font-family:&#39;Segoe UI&#39;,&#39;Inter&#39;,sans-serif;white-space:nowrap;">Legal Intelligence</span>
          <div style="display:flex;align-items:center;gap:2px;margin-left:8px;">
            <span style="color:rgba(255,255,255,0.3);font-size:14px;cursor:default;padding:2px 6px;border-radius:4px;transition:background 150ms;" onmouseenter="this.style.background=&#39;rgba(255,255,255,0.08)&#39;" onmouseleave="this.style.background=&#39;transparent&#39;">←</span>
            <span style="color:rgba(255,255,255,0.3);font-size:14px;cursor:default;padding:2px 6px;border-radius:4px;transition:background 150ms;" onmouseenter="this.style.background=&#39;rgba(255,255,255,0.08)&#39;" onmouseleave="this.style.background=&#39;transparent&#39;">→</span>
          </div>

        <div style="display:flex;align-items:stretch;height:100%;">
          <div style="width:46px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:0.65rem;cursor:default;transition:background 150ms;" onmouseenter="this.style.background=&#39;rgba(255,255,255,0.08)&#39;" onmouseleave="this.style.background=&#39;transparent&#39;">─</div>
          <div style="width:46px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:0.6rem;cursor:default;transition:background 150ms;" onmouseenter="this.style.background=&#39;rgba(255,255,255,0.08)&#39;" onmouseleave="this.style.background=&#39;transparent&#39;">□</div>
